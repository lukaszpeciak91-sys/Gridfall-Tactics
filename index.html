<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="screen-orientation" content="portrait" />
    <meta name="x5-orientation" content="portrait" />
    <meta name="x5-fullscreen" content="true" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700&family=Orbitron:wght@600;700&family=Rajdhani:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <title>Gridfall Tactics</title>
    <style>
      :root {
        color-scheme: dark;
        --game-portrait-width: 390;
        --game-portrait-height: 844;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        overflow: hidden;
        background: #111827;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }

      #app {
        width: 100%;
        height: 100%;
        background: #111827;
      }

      #app:fullscreen,
      #app:-webkit-full-screen {
        width: 100vw;
        height: 100vh;
        width: 100dvw;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        box-sizing: border-box;
      }

      #app[data-portrait-frame-fit="true"] {
        flex: 0 0 auto;
        box-shadow: 0 0 32px rgba(0, 0, 0, 0.42);
      }

      #app[data-portrait-frame-fit="true"] canvas {
        flex: 0 0 auto;
        max-width: var(--portrait-frame-fit-width);
        max-height: var(--portrait-frame-fit-height);
      }

      #app canvas {
        display: block;
      }

      #startup-splash {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 39%, rgba(37, 99, 235, 0.14), transparent 34%),
          linear-gradient(180deg, #111827 0%, #0b1220 100%);
        pointer-events: none;
        touch-action: manipulation;
        transition: opacity 140ms ease;
      }

      #startup-splash.is-ready {
        cursor: pointer;
        pointer-events: auto;
      }

      #startup-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .startup-splash__stage {
        position: absolute;
        top: 39%;
        left: 50%;
        width: min(122vw, calc(76vh * 2.4), 642px);
        transform: translate(-50%, -50%);
        display: grid;
        justify-items: center;
        gap: 18px;
      }

      .startup-splash__logo {
        display: block;
        width: 100%;
        max-height: 76vh;
        object-fit: contain;
        filter: drop-shadow(0 0 24px rgba(147, 197, 253, 0.18));
        transition: opacity 140ms ease;
      }

      .startup-splash__meta {
        display: grid;
        justify-items: center;
        gap: 10px;
        transform: translateY(-10px);
        transition: opacity 150ms ease, transform 150ms ease;
      }

      .startup-splash__copy {
        min-height: 14px;
        color: rgba(245, 241, 230, 0.78);
        font: 700 11px/1.2 "Rajdhani", "Segoe UI", Arial, sans-serif;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        text-shadow: 0 0 14px rgba(125, 211, 252, 0.18);
      }

      .startup-splash__ring {
        position: relative;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 1px solid rgba(125, 211, 252, 0.16);
        box-shadow: inset 0 0 14px rgba(125, 211, 252, 0.08);
        transition: opacity 150ms ease;
      }

      .startup-splash__ring::before,
      .startup-splash__ring::after {
        content: "";
        position: absolute;
        inset: -2px;
        border-radius: 50%;
        border: 1px solid transparent;
        animation: startup-signal-rotate 1.45s linear infinite;
      }

      .startup-splash__ring::before {
        border-top-color: rgba(245, 198, 94, 0.86);
        border-right-color: rgba(245, 198, 94, 0.2);
      }

      .startup-splash__ring::after {
        inset: 5px;
        border-left-color: rgba(125, 211, 252, 0.72);
        border-bottom-color: rgba(125, 211, 252, 0.16);
        animation-duration: 2.1s;
        animation-direction: reverse;
      }

      #startup-splash.is-ready .startup-splash__ring {
        opacity: 0;
      }

      #startup-splash.is-ready .startup-splash__ring::before,
      #startup-splash.is-ready .startup-splash__ring::after {
        animation-play-state: paused;
      }

      #startup-splash.is-ready .startup-splash__copy::before {
        content: "TAP ANYWHERE";
      }

      #startup-splash.is-ready .startup-splash__copy {
        color: transparent;
        font-size: 13px;
        text-shadow: 0 0 16px rgba(245, 198, 94, 0.28);
      }

      #startup-splash.is-ready .startup-splash__copy::before {
        color: rgba(245, 241, 230, 0.9);
      }

      #startup-splash.is-tapped .startup-splash__meta,
      #startup-splash.is-handoff .startup-splash__meta {
        opacity: 0;
        transform: translateY(-14px);
        pointer-events: none;
      }

      #startup-splash.is-handoff .startup-splash__logo {
        opacity: 0;
      }

      @keyframes startup-signal-rotate {
        to { transform: rotate(360deg); }
      }

      #orientation-message {
        position: fixed;
        top: calc(env(safe-area-inset-top) + 12px);
        left: 50%;
        z-index: 10;
        transform: translateX(-50%);
        display: none;
        padding: 8px 14px;
        border: 1px solid rgba(125, 211, 252, 0.32);
        border-radius: 999px;
        background: rgba(2, 6, 23, 0.7);
        color: rgba(248, 250, 252, 0.88);
        font: 600 13px/1.2 Arial, sans-serif;
        letter-spacing: 0.01em;
        pointer-events: none;
        text-align: center;
        white-space: nowrap;
      }

      @media (orientation: landscape) {
        #app {
          width: min(100vw, calc(100vh * var(--game-portrait-width) / var(--game-portrait-height)));
          height: min(100vh, calc(100vw * var(--game-portrait-height) / var(--game-portrait-width)));
          max-width: 100vw;
          max-height: 100vh;
          width: min(100vw, calc(100dvh * var(--game-portrait-width) / var(--game-portrait-height)));
          height: min(100dvh, calc(100vw * var(--game-portrait-height) / var(--game-portrait-width)));
          max-height: 100dvh;
          aspect-ratio: var(--game-portrait-width) / var(--game-portrait-height);
          box-shadow: 0 0 32px rgba(0, 0, 0, 0.42);
        }

        #app:fullscreen,
        #app:-webkit-full-screen {
          width: 100vw;
          height: 100vh;
          width: 100dvw;
          height: 100dvh;
          max-width: none;
          max-height: none;
          aspect-ratio: auto;
          box-shadow: none;
        }

        #orientation-message {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="startup-splash" aria-live="polite" aria-label="Preparing broadcast">
      <div class="startup-splash__stage">
        <img class="startup-splash__logo" src="assets/ui/gridfall-logo.png" alt="Gridfall Tactics" decoding="async" />
        <div class="startup-splash__meta">
          <div class="startup-splash__ring" aria-hidden="true"></div>
          <div class="startup-splash__copy">PREPARING BROADCAST</div>
        </div>
      </div>
    </div>
    <div id="orientation-message" aria-live="polite">Rotate device to portrait</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
