<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Gridfall Tactics</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #111827;
      }

      #app {
        width: 100%;
        height: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .static-landing {
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        width: min(92vw, 420px);
        min-height: min(88vh, 760px);
        padding: 2rem 1.5rem;
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(17, 24, 39, 0.95), rgba(3, 7, 18, 0.98));
        color: #ffffff;
        text-align: center;
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
      }

      .static-landing h1 {
        margin: 0;
        font-size: clamp(1.75rem, 7vw, 2.4rem);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .static-landing .start-label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 9rem;
        min-height: 3rem;
        padding: 0.5rem 1.5rem;
        border: 2px solid #ffffff;
        border-radius: 999px;
        font-weight: 700;
        letter-spacing: 0.12em;
      }

      .static-landing .status {
        margin: 0;
        opacity: 0.9;
        font-size: 0.95rem;
      }

      canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="static-landing" role="region" aria-label="Static landing screen">
        <h1>Gridfall Tactics</h1>
        <div class="start-label" aria-hidden="true">START</div>
        <p class="status">Static landing loaded</p>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
