<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="screen-orientation" content="portrait" />
    <meta name="x5-orientation" content="portrait" />
    <meta name="x5-fullscreen" content="true" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700&family=Orbitron:wght@600;700&family=Rajdhani:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <title>Gridfall Tactics</title>
    <style>
      :root {
        color-scheme: dark;
        --game-portrait-width: 390;
        --game-portrait-height: 844;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        overflow: hidden;
        background: #111827;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }

      #app {
        width: 100%;
        height: 100%;
        background: #111827;
      }

      #app:fullscreen,
      #app:-webkit-full-screen {
        width: 100vw;
        height: 100vh;
        width: 100dvw;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        box-sizing: border-box;
      }

      #app[data-portrait-frame-fit="true"] {
        flex: 0 0 auto;
        box-shadow: 0 0 32px rgba(0, 0, 0, 0.42);
      }

      #app[data-portrait-frame-fit="true"] canvas {
        flex: 0 0 auto;
        max-width: var(--portrait-frame-fit-width);
        max-height: var(--portrait-frame-fit-height);
      }

      #app canvas {
        display: block;
      }

      #orientation-message {
        position: fixed;
        top: calc(env(safe-area-inset-top) + 12px);
        left: 50%;
        z-index: 10;
        transform: translateX(-50%);
        display: none;
        padding: 8px 14px;
        border: 1px solid rgba(125, 211, 252, 0.32);
        border-radius: 999px;
        background: rgba(2, 6, 23, 0.7);
        color: rgba(248, 250, 252, 0.88);
        font: 600 13px/1.2 Arial, sans-serif;
        letter-spacing: 0.01em;
        pointer-events: none;
        text-align: center;
        white-space: nowrap;
      }

      @media (orientation: landscape) {
        #app {
          width: min(100vw, calc(100vh * var(--game-portrait-width) / var(--game-portrait-height)));
          height: min(100vh, calc(100vw * var(--game-portrait-height) / var(--game-portrait-width)));
          max-width: 100vw;
          max-height: 100vh;
          width: min(100vw, calc(100dvh * var(--game-portrait-width) / var(--game-portrait-height)));
          height: min(100dvh, calc(100vw * var(--game-portrait-height) / var(--game-portrait-width)));
          max-height: 100dvh;
          aspect-ratio: var(--game-portrait-width) / var(--game-portrait-height);
          box-shadow: 0 0 32px rgba(0, 0, 0, 0.42);
        }

        #app:fullscreen,
        #app:-webkit-full-screen {
          width: 100vw;
          height: 100vh;
          width: 100dvw;
          height: 100dvh;
          max-width: none;
          max-height: none;
          aspect-ratio: auto;
          box-shadow: none;
        }

        #orientation-message {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="orientation-message" aria-live="polite">Rotate device to portrait</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
